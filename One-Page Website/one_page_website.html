<!DOCTYPE html>
<html>

<head>
    <title>My website for class.</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div>
            <h1>Welcome to my website!</h1>
            <p>This website is being used, so I can get used to HTML and CSS!</p>
        </div>
    </header>

    <!-- IMAGE SECTION -->
    <section>
        <h2>Otter images!</h2>

        <!-- Images used to open the lightbox -->
        <div class="row">
            <div class="column">
                <img src="otter pics/dapper man.jpg" onclick="openModal();currentSlide(1)" class="hover-shadow">
            </div>

            <div class="column">
                <img src="otter pics/deer.jpg" onclick="openModal();currentSlide(2)" class="hover-shadow">
            </div>

            <div class="column">
                <img src="otter pics/W.jpg" onclick="openModal();currentSlide(3)" class="hover-shadow">
            </div>

            <div class="column">
                <img src="otter pics/spooky.jpg" onclick="openModal();currentSlide(4)" class="hover-shadow">
            </div>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section>
        <div>
            <h3>Please provide me with your contact information!</h3>

            <div>
                <form>
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name"><br>

                    <input type="text" placeholder="Email"><br>
                    <input type="tel" placeholder="Phone Number"><br>

                    <input type="checkbox" id="News">
                    <label for="News">
                        Would you like to subscribe to get weekly otter facts?
                    </label>

                    <textarea placeholder="Type message here..."></textarea><br>

                    <input type="submit" value="Submit">
                </form>
            </div>
        </div>
    </section>

    <!-- VIDEOS -->
    <section>
        <div id="video">
            <h3>Videos</h3>

            <iframe width="1280" height="720" src="https://www.youtube.com/embed/mFjwTzhV6P0?si=OMt_xw2xx41xrob3">
            </iframe>
        </div>
    </section>

    <!-- LIGHTBOX MODAL -->
    <div id="myModal" class="modal">

        <span class="close cursor" onclick="closeModal()">&times;</span>

        <div class="modal-content">

            <div class="mySlides">
                <div class="numbertext">1 / 4</div>
                <img src="otter pics/dapper man.jpg" style="width:100%">
            </div>

            <div class="mySlides">
                <div class="numbertext">2 / 4</div>
                <img src="otter pics/otter2.jpg" style="width:100%">
            </div>

            <div class="mySlides">
                <div class="numbertext">3 / 4</div>
                <img src="otter pics/otter3.jpg" style="width:100%">
            </div>

            <div class="mySlides">
                <div class="numbertext">4 / 4</div>
                <img src="otter pics/otter4.jpg" style="width:100%">
            </div>

            <!-- Next / Previous Controls -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>

            <!-- Caption -->
            <div class="caption-container">
                <p id="caption"></p>
            </div>

            <!-- Thumbnail Controls -->
            <div class="column">
                <img class="demo" src="otter pics/dapper man.jpg" onclick="currentSlide(1)" alt="Otter">
            </div>

            <div class="column">
                <img class="demo" src="otter pics/otter2.jpg" onclick="currentSlide(2)" alt="Otter">
            </div>

            <div class="column">
                <img class="demo" src="otter pics/otter3.jpg" onclick="currentSlide(3)" alt="Otter">
            </div>

            <div class="column">
                <img class="demo" src="otter pics/otter4.jpg" onclick="currentSlide(4)" alt="Otter">
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <table>
            <tr>
                <td>
                    <p>Otter website!</p>
                </td>

                <td>
                    <p>123 River dr</p>
                    <p>North America</p>
                </td>

                <td>
                    <p>123-456-7890</p>
                </td>
            </tr>
        </table>
    </footer>

    <script src="js/lightbox.js"></script>

</body>

</html>
